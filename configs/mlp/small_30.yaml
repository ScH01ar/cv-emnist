seed: 42
device: auto

data:
  batch_size: 128
  val_ratio: 0.1
  num_workers: 4
  train_subset_ratio: 0.3
  augmentation:
    enabled: true
    rotation_deg: 10
    translate: 0.05
    gaussian_noise_std: 0.02

model:
  file: models/mlp.py
  class_name: MLP
  kwargs:
    hidden_dims: [512, 256, 128]
    activation: relu
    norm: batchnorm
    dropout: 0.2

train:
  run_name: mlp_small_30
  epochs: 50
  optimizer:
    name: adam
    lr: 0.001
    weight_decay: 0.0
    momentum: 0.9
  scheduler:
    name: plateau
    patience: 2
    factor: 0.5
    min_lr: 0.000001
  regularization:
    type: l1
    l1_lambda: 0.00001
    l2_lambda: 0.0
