seed: 42
device: auto

data:
  batch_size: 128
  val_ratio: 0.1
  num_workers: 2

model:
  file: models/mlp.py
  class_name: MLP
  kwargs:
    hidden_dims: [512, 256, 128]
    dropout: 0.2

train:
  run_name: mlp_baseline
  epochs: 10
  lr: 0.001
  optimizer: adam
  weight_decay: 0.0
  momentum: 0.9
