seed: 42
device: auto

data:
  batch_size: 128
  val_ratio: 0.1
  num_workers: 0
  train_subset_ratio: 1.0

model:
  file: models/resnet.py
  class_name: MiniResNet
  kwargs:
    activation: gelu
    norm: batchnorm
    dropout: 0.0

train:
  run_name: resnet_small_100
  epochs: 15
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: cosine
    t_max: 15
    min_lr: 0.000001
  regularization:
    type: l1
    l1_lambda: 0.00001
