seed: 42
device: auto

data:
  batch_size: 128
  val_ratio: 0.1
  num_workers: 0  

model:
  file: models/resnet.py
  class_name: MiniResNet  
  kwargs:
    activation: relu
    norm: batchnorm
    dropout: 0.2

train:
  run_name: resnet_sgd
  epochs: 15
  optimizer:
    name: sgd
    lr: 0.01
    momentum: 0.9
  scheduler:
    name: none
  regularization:
    type: l2
    l2_lambda: 1e-4