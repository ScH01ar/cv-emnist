seed: 42
device: auto

data:
  batch_size: 128
  val_ratio: 0.1
  num_workers: 0

model:
  file: models/cnn.py
  class_name: CNN
  kwargs:
    activation: gelu
    norm: batchnorm
    dropout: 0.0

train:
  run_name: cnn_adam_step_gelu_l2_0.0
  epochs: 15
  optimizer:
    name: adam
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: step
    step_size: 5    # 每隔 5 个 epoch 调整一次
    gamma: 0.1       # 学习率变为原来的 10%
  regularization:
    type: l2
    l2_lambda: 0.0001