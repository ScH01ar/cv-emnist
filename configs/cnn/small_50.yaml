seed: 42
device: auto

data:
  batch_size: 128
  val_ratio: 0.1
  num_workers: 0
  train_subset_ratio: 0.5

model:
  file: models/cnn.py
  class_name: CNN
  kwargs:
    activation: gelu
    norm: batchnorm
    dropout: 0.2

train:
  run_name: cnn_small_50
  epochs: 15
  optimizer:
    name: adam
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: step
    step_size: 5
    gamma: 0.1
  regularization:
    type: l2
    l2_lambda: 0.0001
