seed: 42
device: auto

data:
  batch_size: 128
  val_ratio: 0.1
  num_workers: 0

model:
  file: models/cnn.py
  class_name: CNN
  kwargs:
    activation: relu
    norm: batchnorm
    dropout: 0.2

train:
  run_name: cnn_adam_cosine
  epochs: 15
  optimizer:
    name: adam
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: cosine
    t_max: 15
    min_lr: 0.000001
  regularization:
    type: l2
    l2_lambda: 0.0001